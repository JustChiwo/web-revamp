<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Bennett Tea: Contact Us</title>

    <!-- Bootstrap link -->
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
      crossorigin="anonymous"
    />
    <!-- <link href = "sass-js/scss/styles.scss" rel="stylesheet"> -->
    <link rel="stylesheet" href="style.css" />
    <!-- Google Fonts link -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Quicksand:wght@300..700&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <!-- Navbar -->
    <nav class="ss-nav">
      <a href="index.html">Home</a>
      <a href="index.html#about-us">About</a>
      <a href="products.html">Products</a>
    </nav>

    <!-- Contact details section -->
    <div class="container-fluid">
      <div class="row">
        <!-- Left Section -->
        <div class="conctact">
          <h2>Contact details</h2>
        </div>

        <section class="container">
          <div class="row" class="mb-3">
            <div class="col">
              <label for="First Name" class="form-label">First Name</label>
              <input
                type="text"
                style="width: 150px"
                class="form-control"
                id="First Name"
                placeholder="John"
              />
            </div>
            <div class="mb-3">
              <label for="Last Name" class="form-label">Last Name</label>
              <input
                type="text"
                style="width: 150px"
                class="form-control"
                id="Last Name"
                placeholder="Doe"
              />
            </div>
            <div class="mb-3">
              <label for="Phone" class="form-label">Phone Number</label>
              <input
                type="text"
                style="width: 150px"
                class="form-control"
                id="Phone"
                placeholder="+27 23 456 7890"
              />
            </div>
            <div class="mb-3">
              <label for="Email" class="form-label">Email address</label>
              <input
                type="email"
                style="width: 220px"
                class="form-control"
                id="Email"
                placeholder="name@example.com"
              />
            </div>
            <div class="mb-3">
              <label for="Message" class="form-label"
                >What do you have in mind?</label
              >
              <textarea
                style="width: 220px"
                class="form-control"
                id="Message"
                placeholder="Write your message..."
                rows="3"
              ></textarea>
              <br />
              <button color="primary" type="submit">Submit</button>
            </div>

            <p>
              To reach us, contact us on any of the following channels. If
              you're also interested in connecting with us, use the contact
              form.
            </p>
            <br />
            <p>(947)856-1795</p>
            <br />
            <i class="bi bi-envelope-fill"></i>
            <a href="mailto:info@bennet-tea.com">info@bennet-tea.com</a> <br />
          </div>
        </section>
      </div>
    </div>
  </body>
</html>
