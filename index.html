<!doctype html>
<html lang="en">

  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Bennet Read</title>
    
    <!-- Bootstrap link -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link href = "sass-js/scss/styles.scss" rel="stylesheet">
  </head>
<body>

  <!-- Contact details section -->
   <div class="container-fluid">
  <div class="row">
    <!-- Left Section -->
    <div class="col-md-6 bg-light p-4">
      <h2>Contact details</h2>
    </div>
    
    <!-- Right Section -->
    <div class="col-md-6 bg-secondary text-white p-4">
      <h2>Contact Us</h2>
    </div>
  </div>
</div>

<section class="container">
<div class="row" class="mb-3">
  <div class="col">
  <label for="First Name" class="form-label">First Name</label>
  <input  type="text" style="width: 150px;" class="form-control" id="First Name" placeholder="John">
</div>
<div class="mb-3">
  <label for="Last Name" class="form-label">Last Name</label>
  <input type="text" style="width: 150px;" class="form-control" id="Last Name" placeholder="Doe">
</div>
<div class="mb-3">
  <label for="Phone" class="form-label">Phone Number</label>
  <input type="text" style="width: 150px;" class="form-control" id="Phone" placeholder="+27 23 456 7890">
</div>
<div class="mb-3">
  <label for="Email" class="form-label">Email address</label>
  <input type="email" style="width: 220px;" class="form-control" id="Email" placeholder="name@example.com">
</div>
<div class="mb-3">
  <label for="Message" class="form-label">What do you have in mind?</label>
  <textarea style="width: 220px;"class="form-control" id="Message" placeholder="Write your message..." rows="3"></textarea>
  <button color="primary" type="submit">Submit</button>
</div>

<div class="row">
  <div class="col-md-6 offset-md-6">
    <p> To reach us, contact us on any of the following channels. If you're also interested in connecting with us, use the contact form.</p>
    <br>
    <i class="bi bi-telephone-fill"></i> +27 23 456 7890
    <br>
    <i class="bi bi-envelope-fill"></i> <a href="mailto:info@bennetread.com">info@bennetread.com</a>
    <br>
  </div>
</div>
